<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Heart Roxo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* TEXTO EM CIMA */
.top-text{
    position:absolute;
    top:40px;
    color:#bb00ff;
    font-size:38px;
    font-weight:bold;
    text-shadow:0 0 20px #bb00ff;
    z-index:10;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<!-- TEXTO EM CIMA -->
<div class="top-text">
    EU TE AMO MUITO MAITE
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

let angle = 0;

const NUM_STEPS = 220;
const SCALE = 18;
const TEXT = "MAITE EU TE AMO";

function heartX(t){
    return 16 * Math.pow(Math.sin(t), 3);
}

function heartY(t){
    return 13 * Math.cos(t)
         - 5 * Math.cos(2 * t)
         - 2 * Math.cos(3 * t)
         - Math.cos(4 * t);
}

function draw(){

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    /* LETRAS GRANDES */
    ctx.font = "bold 22px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for(let i = 0; i < NUM_STEPS; i++){

        const t = (Math.PI * 2 / NUM_STEPS) * i + angle;

        const x = heartX(t) * SCALE;
        const y = -heartY(t) * SCALE;

        const px = cx + x;
        const py = cy + y;

        /* ROXO */
        ctx.fillStyle = "#bb00ff";

        ctx.save();

        ctx.translate(px, py);

        /* SEM GIRAR */
        ctx.rotate(0);

        ctx.fillText(TEXT, 0, 0);

        ctx.restore();
    }

    /* MOVIMENTO LENTO */
    angle += 0.002;

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
